<!DOCTYPE html>
<html>
<head>
  <!--
    Use a relative base URL so that the app works both from the domain root and
    when hosted in a sub-directory (e.g., GitHub Pages `/english_learning_app/`).

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Allow Flutter web, Firebase, and Google Fonts (google_fonts package). -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    base-uri 'self';
    object-src 'none';
    script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: blob: https:;
    media-src 'self' blob: https:;
    connect-src 'self'
      https://*.googleapis.com
      https://*.gstatic.com
      https://*.firebaseio.com
      wss://*.firebaseio.com
      https://*.cloudfunctions.net
      https://*.firebaseapp.com
      https://firebasestorage.googleapis.com
      https://res.cloudinary.com
      https://pixabay.com
      https://accounts.google.com
      https://apis.google.com
      https://www.googleapis.com;
    worker-src 'self' blob:;
    frame-src 'self' https://accounts.google.com https://*.firebaseapp.com;
    manifest-src 'self';
  ">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="english_app_final">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>english_app_final</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
